name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - uses: nrwl/nx-set-shas@v4
      - name: Lint, test, build (affected)
        run: npx nx affected -t lint test build
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - uses: nrwl/nx-set-shas@v4
      - name: Playwright e2e (affected)
        run: npx nx affected -t e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

  # NOTE: From Slice 3 (history persistence) a MySQL service container is added
  # to the relevant job(s), migrations are run against it before tests, and
  # `calculation_history` is truncated between specs. See decisions #63/#64.
